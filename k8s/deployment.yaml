apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-growth-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-growth
  template:
    metadata:
      labels:
        app: ai-growth
    spec:
      containers:
        - name: app
          image: node:18
          command: ["npm","start"]
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-growth-service
spec:
  type: LoadBalancer
  selector:
    app: ai-growth
  ports:
    - port: 80
      targetPort: 3000
